name: ci-web-docker

on:
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - .github/workflows/ci-web-docker.yml
      - Dockerfile
      - apps/bff/**
      - nginx.conf
      - package-lock.json
      - package.json
      - scripts/**
      - src/**
      - work/publications/**
      - tests/**
  workflow_dispatch:

concurrency:
  group: ci-web-docker
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  SPA_IMAGE_NAME: contacts-web
  BFF_IMAGE_NAME: contacts-web

jobs:
  publish-spa-image:
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          role-session-name: ${{ vars.ECR_ROLE_NAME }}

      - name: login to amazon ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: set image uri
        id: image
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${SPA_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: set up qemu
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.SPA_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }}

      - name: build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=spa-image
          cache-to: type=gha,mode=max,scope=spa-image

  publish-bff-image:
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          role-session-name: ${{ vars.ECR_ROLE_NAME }}

      - name: login to amazon ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: set image uri
        id: image
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${BFF_IMAGE_NAME}:bff-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: set up qemu
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.BFF_IMAGE_NAME }}
          tags: |
            type=raw,value=bff-${{ github.sha }}

      - name: build and push bff image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/bff/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=bff-image
          cache-to: type=gha,mode=max,scope=bff-image

  dispatch-integration-sandbox:
    needs:
      - publish-spa-image
      - publish-bff-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    env:
      GH_TOKEN: ${{ secrets.GH_INTEGRATION_SANDBOX_DISPATCH_TOKEN }}
      TARGET_REPOSITORY: wastingnotime/integration-sandbox
      EVENT_TYPE: candidate-image-updated
      SPA_IMAGE_URI: ${{ needs.publish-spa-image.outputs.image_uri }}
      BFF_IMAGE_URI: ${{ needs.publish-bff-image.outputs.image_uri }}

    steps:
      - name: dispatch integration sandbox repository event
        run: |
          gh api "repos/${TARGET_REPOSITORY}/dispatches" \
            -X POST \
            --input - <<EOF
          {
            "event_type": "${EVENT_TYPE}",
            "client_payload": {
              "service": "contacts-web",
              "image": "${SPA_IMAGE_URI}",
              "sha": "${GITHUB_SHA}"
            }
          }
          EOF
