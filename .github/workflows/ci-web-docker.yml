name: ci-web-docker

on:
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - .github/workflows/ci-web-docker.yml
      - Dockerfile
      - nginx.conf
      - package-lock.json
      - package.json
      - src/**
      - tests/**
  workflow_dispatch:

concurrency:
  group: ci-web-docker
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  IMAGE_NAME: contacts-web
  INFRA_REPOSITORY: wastingnotime/infrastructure

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_DEFAULT_REGION }}
          role-to-assume: ${{ secrets.ECR_ROLE_ARN }}
          role-session-name: ${{ vars.ECR_ROLE_NAME }}

      - name: login to amazon ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: set image uri
        id: image
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: set up qemu
        uses: docker/setup-qemu-action@v3

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver: docker-container

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }}

      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote-infrastructure:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    env:
      GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
      BRANCH_NAME: promote-contacts-web-${{ github.sha }}
      IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}

    steps:
      - name: checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: wastingnotime/infrastructure
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infrastructure
          fetch-depth: 0

      - name: configure git identity
        working-directory: infrastructure
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: update swarm promotion files
        working-directory: infrastructure
        run: |
          git switch -c "$BRANCH_NAME"

          env IMAGE_URI="$IMAGE_URI" perl -0pi -e 's@    image: \$\{CONTACTS_WEB_IMAGE\}\n@    image: $ENV{IMAGE_URI}\n@' \
            terraform/environments/production/swarm/stacks/contacts-web.yml

          perl -0pi -e 's@  contacts-web\.yml\)\n    require_var "CONTACTS_WEB_IMAGE"\n    ;;\n@  contacts-web.yml)\n    ;;\n@' \
            terraform/environments/production/swarm/scripts/deploy-stack.sh

          git add terraform/environments/production/swarm/stacks/contacts-web.yml
          git add terraform/environments/production/swarm/scripts/deploy-stack.sh
          git commit -m "chore: promote contacts-web image"
          git push -u origin "$BRANCH_NAME"

      - name: open infrastructure pull request
        working-directory: infrastructure
        run: |
          printf '%s\n\n%s\n' \
            "Promote contacts-web image ${IMAGE_URI} into the production swarm stack." \
            "This updates the stack file to use the built ECR image directly and removes the obsolete CONTACTS_WEB_IMAGE stack input for contacts-web deployments." \
            > /tmp/contacts-web-pr-body.md

          gh pr create \
            --repo "$INFRA_REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "chore: promote contacts-web image ${GITHUB_SHA}" \
            --body-file /tmp/contacts-web-pr-body.md
