name: ci-web-docker

on:
  push:
    branches:
      - main
    paths:
      - .dockerignore
      - .github/workflows/ci-web-docker.yml
      - Dockerfile
      - apps/bff/**
      - nginx.conf
      - package-lock.json
      - package.json
      - scripts/**
      - src/**
      - work/publications/**
      - tests/**
  workflow_dispatch:

concurrency:
  group: ci-web-docker
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  SPA_IMAGE_NAME: contacts-web
  BFF_IMAGE_NAME: contacts-web

jobs:
  publish-spa-image:
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.publish.outputs.image_reference }}

    steps:
      - name: checkout
        uses: actions/checkout@v7.0.0

      - name: Publish SPA image
        id: publish
        uses: ./actions/publish-candidate-image
        with:
          aws_default_region: ${{ env.AWS_DEFAULT_REGION }}
          aws_role_to_assume: ${{ secrets.ECR_ROLE_ARN }}
          ecr_role_name: ${{ vars.ECR_ROLE_NAME }}
          ecr_repository: ${{ env.SPA_IMAGE_NAME }}
          service_name: contacts-web
          build_context: .
          dockerfile: ./Dockerfile
          publish_latest: "true"

  publish-bff-image:
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.publish.outputs.image_reference }}

    steps:
      - name: checkout
        uses: actions/checkout@v7.0.0

      - name: Publish BFF image
        id: publish
        uses: ./actions/publish-candidate-image
        with:
          aws_default_region: ${{ env.AWS_DEFAULT_REGION }}
          aws_role_to_assume: ${{ secrets.ECR_ROLE_ARN }}
          ecr_role_name: ${{ vars.ECR_ROLE_NAME }}
          ecr_repository: ${{ env.BFF_IMAGE_NAME }}
          service_name: contacts-web
          build_context: .
          dockerfile: apps/bff/Dockerfile
          image_tag_prefix: bff-
          publish_latest: "false"

  dispatch-integration-sandbox:
    needs:
      - publish-spa-image
      - publish-bff-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    env:
      GH_TOKEN: ${{ secrets.GH_INTEGRATION_SANDBOX_DISPATCH_TOKEN }}
      TARGET_REPOSITORY: wastingnotime/integration-sandbox
      EVENT_TYPE: candidate-image-updated
      SPA_IMAGE_URI: ${{ needs.publish-spa-image.outputs.image_uri }}
      BFF_IMAGE_URI: ${{ needs.publish-bff-image.outputs.image_uri }}

    steps:
      - name: dispatch integration sandbox repository event
        run: |
          gh api "repos/${TARGET_REPOSITORY}/dispatches" \
            -X POST \
            --input - <<EOF
          {
            "event_type": "${EVENT_TYPE}",
            "client_payload": {
              "service": "contacts-web",
              "image": "${SPA_IMAGE_URI}",
              "bff_image": "${BFF_IMAGE_URI}",
              "sha": "${GITHUB_SHA}"
            }
          }
          EOF
